name: Release

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      id-token: write       # OIDC for PyPI trusted publishing
      attestations: write   # GitHub attestations
      contents: write       # Create GitHub releases, push tags/commits
    environment:
      name: release
      url: https://pypi.org/p/mdformat-frontmatter
    if: github.repository == 'butler54/mdformat-frontmatter'
    steps:
    - name: Harden runner
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        token: ${{ secrets.ADMIN_WRITE_PAT }}

    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.12"

    - name: Install build tools
      run: pip install build

    - name: Python Semantic Release
      id: release
      uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
      with:
        github_token: ${{ secrets.ADMIN_WRITE_PAT }}

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
      if: steps.release.outputs.released == 'true'

    - name: Sign artifacts with Sigstore
      uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
      if: steps.release.outputs.released == 'true'
      with:
        inputs: "dist/*"

    - name: Upload to GitHub Releases
      uses: python-semantic-release/upload-to-gh-release@0a92b5d7ebfc15a84f9801ebd1bf706343d43711 # v9.8.9
      if: steps.release.outputs.released == 'true'
      with:
        github_token: ${{ secrets.ADMIN_WRITE_PAT }}
